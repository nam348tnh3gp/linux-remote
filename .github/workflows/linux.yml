name: 🐧 Multi-Distro Desktop (Xfce4 + VNC + Firefox + Cloudflare Tunnel)

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn distro Linux (image trên Docker Hub)'
        required: true
        default: 'ubuntu:24.04'
        type: choice
        options:
          - 'ubuntu:24.04'
          - 'ubuntu:22.04'
          - 'debian:bookworm'
          - 'debian:bullseye'
          - 'fedora:40'
          - 'fedora:39'
          - 'archlinux:latest'
          - 'alpine:3.20'
          - 'alpine:3.19'
          - 'rockylinux:9'
          - 'rockylinux:8'
      vnc_password:
        description: 'Mật khẩu VNC'
        required: false
        default: '2062007'
        type: string
      vnc_resolution:
        description: 'Độ phân giải màn hình (WxH)'
        required: false
        default: '1280x720'
        type: string
      tunnel_timeout:
        description: 'Thời gian chạy tối đa (phút)'
        required: false
        default: '360'
        type: number

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: ${{ fromJSON(inputs.tunnel_timeout) }}
    
    steps:
      - name: 🐳 Chạy Docker container với distro đã chọn
        run: |
          DISTRO="${{ github.event.inputs.distro }}"
          VNC_PASS="${{ github.event.inputs.vnc_password }}"
          RESOLUTION="${{ github.event.inputs.vnc_resolution }}"
          
          # Xác định package manager và cài đặt lệnh tương ứng
          docker run --rm -d \
            --name multi-desktop \
            -p 5900:5900 \
            -p 8080:8080 \
            -e VNC_PASS="$VNC_PASS" \
            -e RESOLUTION="$RESOLUTION" \
            --privileged \
            $DISTRO \
            sh -c "
              set -ex
              
              # Nhận diện distro và cài gói
              if [ -f /etc/os-release ]; then
                . /etc/os-release
                DISTRO_NAME=\$ID
              else
                DISTRO_NAME=unknown
              fi
              
              case \$DISTRO_NAME in
                ubuntu|debian)
                  apt update
                  apt install -y wget curl xvfb x11vnc novnc websockify \
                                 xfce4 xfce4-goodies dbus-x11 firefox
                  ;;
                fedora|rocky)
                  dnf install -y wget curl xorg-x11-server-Xvfb x11vnc novnc websockify \
                                 xfce4 xfce4-goodies dbus-x11 firefox
                  ;;
                arch)
                  pacman -Syu --noconfirm
                  pacman -S --noconfirm wget curl xorg-server-xvfb x11vnc novnc websockify \
                                 xfce4 xfce4-goodies dbus firefox
                  ;;
                alpine)
                  apk add --no-cache wget curl xvfb x11vnc novnc websockify \
                                 xfce4 xfce4-goodies dbus firefox
                  ;;
                *)
                  echo 'Distro không được hỗ trợ tự động, thử cài thủ công'
                  exit 1
                  ;;
              esac
              
              # Firefox (nếu chưa có hoặc muốn bản mới nhất không snap)
              if ! command -v firefox >/dev/null 2>&1; then
                mkdir -p /opt
                wget -O /tmp/firefox.tar.xz 'https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US'
                tar xJf /tmp/firefox.tar.xz -C /opt/
                ln -sf /opt/firefox/firefox /usr/local/bin/firefox
              fi
              
              # Khởi động Xvfb + Xfce4 + VNC
              export DISPLAY=:99
              Xvfb :99 -screen 0 \${RESOLUTION}x24 &
              sleep 2
              dbus-launch --exit-with-session xfce4-session &
              sleep 3
              x11vnc -display :99 -forever -shared -passwd \$VNC_PASS -rfbport 5900 &
              sleep 2
              
              # Websockify (noVNC)
              websockify --web=/usr/share/novnc 8080 localhost:5900 &
              sleep 2
              
              # Cloudflared tunnel
              curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
              chmod +x /tmp/cloudflared
              /tmp/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
              sleep 8
              
              echo '=== CLOUDFLARE TUNNEL URL ==='
              grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1
              echo '=============================='
              echo 'VNC Password: '\$VNC_PASS
              echo 'Resolution: \$RESOLUTION'
              tail -f /tmp/cloudflared.log
            "
          
      - name: 📤 Logs và thông tin kết nối
        run: |
          echo "✅ Container đang chạy với distro: ${{ github.event.inputs.distro }}"
          echo "🔗 Kết nối VNC qua Cloudflare Tunnel tại URL được in ở trên"
          echo "⚠️  Workflow sẽ tự động dừng sau ${{ github.event.inputs.tunnel_timeout }} phút."
          
          # Giữ workflow chạy
          while docker ps | grep -q multi-desktop; do
            sleep 30
          done
          
      - name: 🧹 Dọn dẹp container khi kết thúc
        if: always()
        run: |
          docker stop multi-desktop 2>/dev/null || true
          docker rm multi-desktop 2>/dev/null || true
