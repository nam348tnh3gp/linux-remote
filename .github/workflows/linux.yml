name: 🖥️ Linux Desktop (VNC) with Cloudflare Tunnel – Multi‑Distro

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn bản distro (image Docker)'
        required: true
        default: 'ubuntu:22.04'
        type: choice
        options:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - fedora:40
          - archlinux:latest
          - alpine:3.19
      vnc_password:
        description: 'Mật khẩu VNC'
        required: false
        default: '2062007'
        type: string

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: 🐳 Chạy container với distro đã chọn
        run: |
          docker run --rm -d \
            --name desktop-env \
            -p 8080:8080 \
            -p 5900:5900 \
            -v /tmp:/host_tmp \
            ${{ github.event.inputs.distro }} \
            sleep infinity
          sleep 3

      - name: 📦 Cài đặt gói và thiết lập môi trường
        run: |
          # Hàm chạy lệnh bên trong container
          docker_exec() {
            docker exec desktop-env bash -c "$1"
          }

          # Phát hiện loại distro
          docker_exec "if command -v apt &>/dev/null; then PKG_MGR='apt'; elif command -v dnf &>/dev/null; then PKG_MGR='dnf'; elif command -v yum &>/dev/null; then PKG_MGR='yum'; elif command -v pacman &>/dev/null; then PKG_MGR='pacman'; elif command -v apk &>/dev/null; then PKG_MGR='apk'; else echo 'Unsupported'; exit 1; fi"

          # Cài đặt các gói cần thiết theo từng loại
          docker_exec '
            case $PKG_MGR in
              apt)
                apt update
                apt install -y wget curl xvfb x11vnc novnc websockify xfce4 xfce4-goodies dbus-x11 firefox
                ;;
              dnf|yum)
                $PKG_MGR install -y wget curl xvfb x11vnc novnc websockify xfce4 firefox
                # novnc có thể cần EPEL hoặc cài bằng pip
                $PKG_MGR install -y epel-release || true
                $PKG_MGR install -y novnc websockify || pip3 install websockify
                ;;
              pacman)
                pacman -Syu --noconfirm wget curl xorg-server-xvfb x11vnc novnc websockify xfce4 firefox
                ;;
              apk)
                apk add wget curl xvfb x11vnc novnc websockify xfce4 firefox dbus
                ;;
            esac
          '

          # Cài cloudflared (dùng binary tĩnh, chạy mọi distro)
          docker exec desktop-env sh -c "
            curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x /tmp/cloudflared
            mv /tmp/cloudflared /usr/local/bin/
          "

          # (Tuỳ chọn) Cài Firefox bản mới nhất cho distro dùng apt
          docker_exec '
            if [ "$PKG_MGR" = "apt" ]; then
              snap remove firefox 2>/dev/null || true
              apt remove --purge firefox -y 2>/dev/null || true
              wget -O /tmp/firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US"
              tar xJf /tmp/firefox.tar.xz -C /opt/
              ln -sf /opt/firefox/firefox /usr/local/bin/firefox
            fi
          '

      - name: 🚀 Khởi động Xvfb, xfce4, VNC và noVNC
        run: |
          docker exec desktop-env bash -c "
            export DISPLAY=:99
            Xvfb :99 -screen 0 1280x720x24 &
            sleep 2
            dbus-launch --exit-with-session xfce4-session &
            sleep 3
            x11vnc -display :99 -forever -shared -passwd ${{ github.event.inputs.vnc_password }} -rfbport 5900 &
            websockify --web=/usr/share/novnc 8080 localhost:5900 &
            sleep 3
          "

      - name: 🌐 Chạy Cloudflare Tunnel (trycloudflare)
        run: |
          docker exec desktop-env sh -c "
            /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
            sleep 10
            echo '=== CLOUDFLARE TUNNEL URL ==='
            grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1
            echo '=============================='
            echo '🔗 Mở link trên bằng trình duyệt, nhập mật khẩu VNC: ${{ github.event.inputs.vnc_password }}'
            echo '⚠️  Workflow sẽ tự động dừng sau 6 giờ (timeout).'
            tail -f /tmp/cloudflared.log
          "
