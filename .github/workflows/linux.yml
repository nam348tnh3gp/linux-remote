name: 🖥️ Linux Desktop (VNC) with Cloudflare Tunnel – Multi‑Distro (non‑root user)

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn bản distro (image Docker)'
        required: true
        default: 'ubuntu:22.04'
        type: choice
        options:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - fedora:40
          - archlinux:latest
          - alpine:3.19
      vnc_password:
        description: 'Mật khẩu VNC'
        required: false
        default: '2062007'
        type: string

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: 🐳 Chạy container với distro đã chọn
        run: |
          docker run --rm -d \
            --name desktop-env \
            -p 8080:8080 \
            -p 5900:5900 \
            -v /tmp:/host_tmp \
            ${{ github.event.inputs.distro }} \
            sleep infinity
          sleep 3

      - name: 📦 Cài đặt gói và tạo user thường có quyền sudo
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }

          PKG_MGR=$(docker_exec "if command -v apt >/dev/null 2>&1; then echo apt; elif command -v dnf >/dev/null 2>&1; then echo dnf; elif command -v yum >/dev/null 2>&1; then echo yum; elif command -v pacman >/dev/null 2>&1; then echo pacman; elif command -v apk >/dev/null 2>&1; then echo apk; else echo unsupported; fi")
          echo "Detected package manager: $PKG_MGR"

          case $PKG_MGR in
            apt)
              docker_exec "apt update && apt install -y wget curl xvfb x11vnc novnc websockify xfce4 xfce4-goodies xfce4-terminal dbus-x11 firefox sudo bash"
              ;;
            dnf|yum)
              docker_exec "$PKG_MGR install -y wget curl xvfb x11vnc novnc websockify xfce4 xfce4-terminal firefox sudo bash"
              docker_exec "$PKG_MGR install -y epel-release || true"
              docker_exec "$PKG_MGR install -y novnc websockify || pip3 install websockify --break-system-packages || true"
              ;;
            pacman)
              docker_exec "pacman -Syu --noconfirm wget curl xorg-server-xvfb x11vnc novnc websockify xfce4 xfce4-terminal firefox sudo bash"
              ;;
            apk)
              docker_exec "apk add wget curl xvfb x11vnc xfce4 xfce4-terminal firefox dbus novnc python3 py3-pip sudo shadow bash"
              docker_exec "pip3 install websockify --break-system-packages"
              ;;
          esac

          # Tạo user runner (shell = bash)
          docker_exec "useradd -m -s /bin/bash -u 1000 runner 2>/dev/null || adduser -D -s /bin/bash -u 1000 runner 2>/dev/null || true"
          docker_exec "echo 'allowed_users=anybody' > /etc/X11/Xwrapper.config 2>/dev/null || true"

          # Sudo NOPASSWD
          case $PKG_MGR in
            apt|debian)
              docker_exec "usermod -aG sudo runner && echo 'runner ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
              ;;
            dnf|yum|fedora|pacman|arch)
              docker_exec "usermod -aG wheel runner && echo 'runner ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
              ;;
            apk|alpine)
              docker_exec "adduser runner wheel && echo '%wheel ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
              ;;
          esac

          docker_exec "passwd -d root"

          # Tạo ~/.xinitrc để start Xfce
          docker_exec "echo 'exec startxfce4' > /home/runner/.xinitrc && chown runner:runner /home/runner/.xinitrc"
          # Dự phòng: nếu startxfce4 không có, dùng xfce4-session
          docker_exec "if ! command -v startxfce4 >/dev/null 2>&1; then echo 'exec xfce4-session' > /home/runner/.xinitrc; fi"

          docker_exec "curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x /tmp/cloudflared && mv /tmp/cloudflared /usr/local/bin/"

          if [ "$PKG_MGR" = "apt" ]; then
            docker_exec "snap remove firefox 2>/dev/null || true; apt remove --purge firefox -y 2>/dev/null || true; wget -O /tmp/firefox.tar.xz 'https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US' && tar xJf /tmp/firefox.tar.xz -C /opt/ && ln -sf /opt/firefox/firefox /usr/local/bin/firefox"
          fi

          docker_exec "mkdir -p /run/user/1000 && chown runner:runner /run/user/1000 2>/dev/null || true"

      - name: 🚀 Khởi động Xvfb, xfce4, VNC và noVNC (có fallback)
        run: |
          docker exec desktop-env sh -c "
            export DISPLAY=:99
            Xvfb :99 -screen 0 1280x720x24 -ac &
            sleep 3
            if ! pgrep -x Xvfb >/dev/null; then
              echo '❌ Xvfb failed'
              exit 1
            fi
            # Chạy desktop với user runner (sử dụng startx hoặc xinit để đọc .xinitrc)
            su -l runner -c 'startx -- :1 > /home/runner/xsession.log 2>&1 &' || su -l runner -c 'xinit /home/runner/.xinitrc -- :1 > /home/runner/xsession.log 2>&1 &'
            sleep 8
            x11vnc -display :99 -forever -shared -passwd ${{ github.event.inputs.vnc_password }} -rfbport 5900 &
            if command -v websockify >/dev/null 2>&1; then
              if [ -d /usr/share/novnc ]; then
                websockify --web=/usr/share/novnc 8080 localhost:5900 &
              elif [ -d /usr/share/novnc/utils ]; then
                websockify --web=/usr/share/novnc/utils 8080 localhost:5900 &
              else
                websockify 8080 localhost:5900 &
              fi
            else
              echo '⚠️ websockify not found, noVNC disabled'
            fi
            sleep 3
            echo '✅ Desktop environment started (check xsession.log for errors)'
          "

      - name: 🌐 Chạy Cloudflare Tunnel (trycloudflare)
        run: |
          docker exec desktop-env sh -c "
            /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
            sleep 10
            echo '=== CLOUDFLARE TUNNEL URL ==='
            grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1
            echo '=============================='
            echo '🔗 Mở link trên, nhập mật khẩu VNC: ${{ github.event.inputs.vnc_password }}'
            echo '⚠️  Workflow timeout 6h.'
            tail -f /tmp/cloudflared.log
          "
