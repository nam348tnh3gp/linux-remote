name: Ubuntu VM with Firefox (no snap) + Xfce4 + VNC + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn distro để chạy'
        required: true
        default: 'ubuntu:24.04'
        type: choice
        options:
          - ubuntu:24.04
          - ubuntu:22.04
          - debian:12
          - fedora:40
          - centos:7
          - alpine:3.19

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Chạy trong Docker container
        uses: addnab/docker-run-action@v3
        with:
          image: ${{ github.event.inputs.distro }}
          options: -v /tmp:/tmp -v /var/run/docker.sock:/var/run/docker.sock
          run: |
            set -ex
            
            # Hàm cài đặt gói theo distro
            if command -v apt-get >/dev/null; then
              apt-get update
              apt-get install -y --no-install-recommends wget curl xvfb x11vnc novnc websockify xfce4 xfce4-goodies dbus-x11
              apt-get remove --purge firefox -y || true
            elif command -v yum >/dev/null; then
              yum update -y
              yum install -y wget curl xorg-x11-server-Xvfb x11vnc novnc websockify epel-release
              yum install -y xfce4 xfce4-goodies dbus-x11 firefox
            elif command -v apk >/dev/null; then
              apk update
              apk add --no-cache wget curl xvfb x11vnc novnc websockify xfce4 xfce4-terminal dbus firefox-esr
            else
              echo "Unsupported distro"
              exit 1
            fi
            
            # Cài Firefox bản mới nhất cho Ubuntu/Debian (không snap)
            if command -v apt-get >/dev/null; then
              wget -O /tmp/firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US"
              tar xJf /tmp/firefox.tar.xz -C /opt/
              ln -sf /opt/firefox/firefox /usr/local/bin/firefox
              cat <<EOF > /usr/share/applications/firefox-custom.desktop
              [Desktop Entry]
              Name=Firefox (no snap)
              Exec=/opt/firefox/firefox %u
              Terminal=false
              Type=Application
              Icon=/opt/firefox/browser/chrome/icons/default/default48.png
              Categories=Network;WebBrowser;
              EOF
            fi
            
            # Cài cloudflared (bản amd64)
            curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
            chmod +x /tmp/cloudflared
            mv /tmp/cloudflared /usr/local/bin/
            
            # Thiết lập Xvfb, Xfce4, VNC
            export DISPLAY=:99
            Xvfb :99 -screen 0 1280x720x24 &
            sleep 2
            dbus-launch --exit-with-session xfce4-session &
            sleep 3
            x11vnc -display :99 -forever -shared -passwd 2062007 -rfbport 5900 &
            sleep 2
            
            # noVNC
            websockify --web=/usr/share/novnc 8080 localhost:5900 &
            sleep 2
            
            # Cloudflared tunnel
            /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
            sleep 8
            echo "=== CLOUDFLARE TUNNEL URL ==="
            grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1
            echo "=============================="
            echo "🔗 Mở link trên bằng trình duyệt, nhập mật khẩu VNC: 2062007"
            echo "⚠️  Workflow sẽ tự động dừng sau 6 giờ."
            tail -f /tmp/cloudflared.log
