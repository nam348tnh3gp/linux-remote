name: 🖥️ Linux Desktop (VNC) with Cloudflare Tunnel – Multi‑Distro (có terminal)

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn bản distro (image Docker)'
        required: true
        default: 'ubuntu:22.04'
        type: choice
        options:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - fedora:40
          - archlinux:latest
          - alpine:3.19
      vnc_password:
        description: 'Mật khẩu VNC'
        required: false
        default: '2062007'
        type: string

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: 🐳 Chạy container với distro đã chọn
        run: |
          docker run --rm -d \
            --name desktop-env \
            -p 8080:8080 \
            -p 5900:5900 \
            -v /tmp:/host_tmp \
            ${{ github.event.inputs.distro }} \
            sleep infinity
          sleep 3

      - name: 📦 Cài đặt gói và thiết lập môi trường
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }

          PKG_MGR=$(docker_exec "if command -v apt >/dev/null 2>&1; then echo apt; elif command -v dnf >/dev/null 2>&1; then echo dnf; elif command -v yum >/dev/null 2>&1; then echo yum; elif command -v pacman >/dev/null 2>&1; then echo pacman; elif command -v apk >/dev/null 2>&1; then echo apk; else echo unsupported; fi")
          echo "Detected package manager: $PKG_MGR"

          # Cài đặt các gói cơ bản + XFCE + VNC + noVNC + Cloudflared + sudo
          case $PKG_MGR in
            apt)
              docker_exec "apt update && apt install -y wget curl xvfb x11vnc novnc websockify xfce4 xfce4-goodies xfce4-terminal dbus-x11 firefox sudo"
              ;;
            dnf|yum)
              docker_exec "$PKG_MGR install -y wget curl xvfb x11vnc xfce4 xfce4-terminal firefox sudo"
              docker_exec "$PKG_MGR install -y epel-release || true"
              # Cài novnc và websockify từ pip cho Fedora
              docker_exec "$PKG_MGR install -y python3-pip || true"
              docker_exec "pip3 install websockify numpy"
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              ;;
            pacman)
              # Arch Linux: cài từ pacman và AUR
              docker_exec "pacman -Syu --noconfirm wget curl xorg-server-xvfb x11vnc xfce4 xfce4-terminal firefox sudo python-pip base-devel git"
              # Cài websockify từ pip
              docker_exec "pip install websockify"
              # Clone noVNC từ GitHub (không có trong pacman)
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              ;;
            apk)
              docker_exec "apk add wget curl xvfb x11vnc xfce4 xfce4-terminal firefox dbus python3 py3-pip sudo shadow"
              docker_exec "pip3 install websockify"
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              ;;
          esac

          docker_exec "curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x /tmp/cloudflared && mv /tmp/cloudflared /usr/local/bin/"

          # Xử lý Firefox riêng cho Ubuntu/Debian (loại bỏ snap nếu có)
          if [ "$PKG_MGR" = "apt" ]; then
            docker_exec "snap remove firefox 2>/dev/null || true; apt remove --purge firefox -y 2>/dev/null || true; wget -O /tmp/firefox.tar.xz 'https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US' && tar xJf /tmp/firefox.tar.xz -C /opt/ && ln -sf /opt/firefox/firefox /usr/local/bin/firefox"
          fi

          # Tạo user thường (vncuser) có quyền sudo không cần mật khẩu
          if [ "$PKG_MGR" = "apk" ]; then
            docker_exec "adduser -D -s /bin/sh vncuser"
            docker_exec "echo 'vncuser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
          else
            docker_exec "useradd -m -s /bin/bash vncuser"
            docker_exec "echo 'vncuser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
          fi

      - name: 🚀 Khởi động Xvfb, xfce4, VNC và noVNC (dưới user thường)
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }
          docker_exec "
            su -l vncuser -s /bin/sh -c '
              export DISPLAY=:99
              mkdir -p ~/.config/xfce4 ~/.cache
              Xvfb :99 -screen 0 1280x720x24 &
              sleep 2
              dbus-launch --exit-with-session xfce4-session &
              sleep 3
              x11vnc -display :99 -forever -shared -passwd ${{ github.event.inputs.vnc_password }} -rfbport 5900 &
              # Khởi động noVNC
              if command -v websockify >/dev/null 2>&1; then
                if [ -d /opt/novnc ]; then
                  websockify --web=/opt/novnc 8080 localhost:5900 &
                elif [ -d /usr/share/novnc ]; then
                  websockify --web=/usr/share/novnc 8080 localhost:5900 &
                else
                  websockify 8080 localhost:5900 &
                fi
              else
                echo \"⚠️ websockify not found, noVNC không khởi động\"
              fi
              sleep 3
            '
          "

      - name: 🌐 Chạy Cloudflare Tunnel (trycloudflare) dưới user thường
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }
          docker_exec "
            su -l vncuser -s /bin/sh -c '
              /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
              sleep 10
              echo \"=== CLOUDFLARE TUNNEL URL ===\"
              grep -o \"https://[-0-9a-z]*\\.trycloudflare\\.com\" /tmp/cloudflared.log | head -1
              echo \"==============================\"
              echo \"🔗 Mở link trên bằng trình duyệt, nhập mật khẩu VNC: ${{ github.event.inputs.vnc_password }}\"
              echo \"⚠️  Workflow sẽ tự động dừng sau 6 giờ (timeout).\"
              tail -f /tmp/cloudflared.log
            '
          "
