name: Multi-Distro VM with Firefox + Xfce4 + VNC + Cloudflare Tunnel

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn bản phân phối Linux'
        required: true
        default: 'ubuntu'
        type: choice
        options:
          - ubuntu
          - debian
          - fedora
          - centos
          - alpine
          - arch

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    container:
      image: ${{ github.event.inputs.distro == 'ubuntu' && 'ubuntu:24.04' || github.event.inputs.distro == 'debian' && 'debian:bookworm' || github.event.inputs.distro == 'fedora' && 'fedora:latest' || github.event.inputs.distro == 'centos' && 'centos:stream9' || github.event.inputs.distro == 'alpine' && 'alpine:latest' || 'archlinux:latest' }}
      options: --privileged
    steps:
      - name: Cài đặt các gói cơ bản (theo distro)
        run: |
          if command -v apt-get &>/dev/null; then
            export DEBIAN_FRONTEND=noninteractive
            apt-get update
            apt-get install -y wget curl xvfb x11vnc novnc websockify \
                               xfce4 xfce4-goodies dbus-x11 firefox-esr \
                               sudo procps net-tools iputils-ping
            apt-get remove --purge firefox -y 2>/dev/null || true
          elif command -v dnf &>/dev/null; then
            dnf install -y wget curl xvfb x11vnc novnc websockify \
                           @xfce xfce4-goodies dbus-x11 firefox \
                           sudo procps-ng net-tools iputils
          elif command -v yum &>/dev/null; then
            yum install -y epel-release
            yum install -y wget curl xvfb x11vnc novnc websockify \
                           xfce4 xfce4-goodies dbus-x11 firefox \
                           sudo procps-ng net-tools iputils
          elif command -v apk &>/dev/null; then
            apk update
            apk add wget curl xvfb x11vnc novnc websockify \
                    xfce4 xfce4-goodies dbus-x11 firefox \
                    sudo procps net-tools iputils
          elif command -v pacman &>/dev/null; then
            pacman -Syu --noconfirm
            pacman -S --noconfirm wget curl xvfb x11vnc novnc websockify \
                               xfce4 xfce4-goodies dbus-x11 firefox \
                               sudo procps net-tools iputils
          fi

      - name: Cài đặt Firefox bản mới nhất (Ubuntu/Debian)
        if: github.event.inputs.distro == 'ubuntu' || github.event.inputs.distro == 'debian'
        run: |
          apt-get remove --purge firefox firefox-esr -y 2>/dev/null || true
          wget -O /tmp/firefox.tar.xz "https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US"
          tar xJf /tmp/firefox.tar.xz -C /opt/
          ln -sf /opt/firefox/firefox /usr/local/bin/firefox
          cat <<EOF > /usr/share/applications/firefox-custom.desktop
[Desktop Entry]
Name=Firefox (latest)
Exec=/opt/firefox/firefox %u
Terminal=false
Type=Application
Icon=/opt/firefox/browser/chrome/icons/default/default48.png
Categories=Network;WebBrowser;
EOF

      - name: Cài đặt cloudflared
        run: |
          curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x /tmp/cloudflared
          mv /tmp/cloudflared /usr/local/bin/cloudflared

      - name: Thiết lập Xfce4 trên Xvfb và VNC
        run: |
          export DISPLAY=:99
          Xvfb :99 -screen 0 1280x720x24 &
          sleep 2
          dbus-launch --exit-with-session xfce4-session &
          sleep 3
          x11vnc -display :99 -forever -shared -passwd 2062007 -rfbport 5900 &
          sleep 2

      - name: Khởi động noVNC + websockify
        run: |
          websockify --web=/usr/share/novnc 8080 localhost:5900 &
          sleep 2

      - name: Chạy cloudflared tunnel
        run: |
          /usr/local/bin/cloudflared tunnel --url http://localhost:8080 --logfile /tmp/cloudflared.log &
          sleep 8
          echo "=== CLOUDFLARE TUNNEL URL ==="
          grep -o 'https://[-0-9a-z]*\.trycloudflare\.com' /tmp/cloudflared.log | head -1
          echo "=============================="
          echo "🔗 Mở link trên, nhập mật khẩu VNC: 2062007"
          tail -f /tmp/cloudflared.log
