name: 🖥️ Linux Desktop (VNC) with Cloudflare Tunnel – Multi‑Distro (có terminal)

on:
  workflow_dispatch:
    inputs:
      distro:
        description: 'Chọn bản distro (image Docker)'
        required: true
        default: 'ubuntu:22.04'
        type: choice
        options:
          - ubuntu:22.04
          - ubuntu:24.04
          - debian:12
          - fedora:40
          - archlinux:latest
          - alpine:3.19
      vnc_password:
        description: 'Mật khẩu VNC & user login'
        required: false
        default: '2062007'
        type: string

jobs:
  vnc:
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    steps:
      - name: 🐳 Chạy container với distro đã chọn
        run: |
          docker run --rm -d \
            --name desktop-env \
            -p 8080:8080 \
            -p 5900:5900 \
            -v /tmp:/host_tmp \
            ${{ github.event.inputs.distro }} \
            sleep infinity
          sleep 3

      - name: 📦 Cài đặt gói và thiết lập môi trường
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }

          PKG_MGR=$(docker_exec "if command -v apt >/dev/null 2>&1; then echo apt; elif command -v dnf >/dev/null 2>&1; then echo dnf; elif command -v yum >/dev/null 2>&1; then echo yum; elif command -v pacman >/dev/null 2>&1; then echo pacman; elif command -v apk >/dev/null 2>&1; then echo apk; else echo unsupported; fi")
          echo "Detected package manager: $PKG_MGR"

          case $PKG_MGR in
            apt)
              docker_exec "apt update && apt install -y wget curl xvfb x11vnc novnc websockify xfce4 xfce4-goodies xfce4-terminal dbus-x11 git sudo"
              docker_exec "apt install -y mesa-utils libgl1-mesa-dri"
              ;;
            dnf|yum)
              docker_exec "$PKG_MGR install -y wget git curl xorg-x11-server-Xvfb x11vnc xfce4-terminal firefox sudo"
              docker_exec "$PKG_MGR groupinstall -y 'XFCE Desktop' || $PKG_MGR install -y @xfce-desktop || $PKG_MGR install -y xfce4-session xfwm4 xfce4-panel xfdesktop thunar"
              docker_exec "$PKG_MGR install -y epel-release || true"
              docker_exec "$PKG_MGR install -y python3-pip || true"
              docker_exec "python3 -m venv /opt/venv"
              docker_exec "/opt/venv/bin/pip install websockify numpy"
              docker_exec "ln -sf /opt/venv/bin/websockify /usr/local/bin/websockify"
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              docker_exec "$PKG_MGR install -y mesa-dri-drivers mesa-libGL mesa-utils"
              docker_exec "$PKG_MGR install -y xorg-x11-drv-intel || true"
              ;;
            pacman)
              docker_exec "pacman -Syu --noconfirm"
              docker_exec "pacman -S --noconfirm wget curl xorg-server-xvfb x11vnc xfce4 xfce4-terminal firefox sudo python-pip base-devel git"
              docker_exec "pacman -S --noconfirm xfce4-session xfwm4 adwaita-icon-theme hicolor-icon-theme ttf-dejavu xorg-xinit dbus"
              docker_exec "pip install websockify --break-system-packages"
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              docker_exec "pacman -S --noconfirm mesa xf86-video-intel"
              ;;
            apk)
              docker_exec "apk add wget git curl xvfb x11vnc xfce4 xfce4-terminal firefox dbus python3 py3-pip sudo shadow"
              docker_exec "apk add adwaita-icon-theme hicolor-icon-theme xfce4-session xfwm4"
              docker_exec "pip3 install websockify --break-system-packages"
              docker_exec "git clone https://github.com/novnc/noVNC.git /opt/novnc"
              docker_exec "ln -sf /opt/novnc/vnc.html /opt/novnc/index.html"
              docker_exec "apk add mesa-dri-gallium mesa-va-gallium xf86-video-intel"
              ;;
          esac

          docker_exec "curl -L --output /tmp/cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 && chmod +x /tmp/cloudflared && mv /tmp/cloudflared /usr/local/bin/"

          if [ "$PKG_MGR" = "apt" ]; then
            docker_exec "wget -O /tmp/firefox.tar.xz 'https://download.mozilla.org/?product=firefox-latest-ssl&os=linux64&lang=en-US' && tar xJf /tmp/firefox.tar.xz -C /opt/ && ln -sf /opt/firefox/firefox /usr/local/bin/firefox"
          fi

          VNC_PASS="${{ github.event.inputs.vnc_password }}"
          if [ "$PKG_MGR" = "apk" ]; then
            docker_exec "adduser -D -s /bin/sh vncuser"
            docker_exec "echo 'vncuser:${VNC_PASS}' | chpasswd"
            docker_exec "echo 'vncuser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
          else
            docker_exec "useradd -m -s /bin/bash vncuser"
            docker_exec "echo 'vncuser:${VNC_PASS}' | chpasswd"
            docker_exec "echo 'vncuser ALL=(ALL) NOPASSWD: ALL' >> /etc/sudoers"
          fi

          docker_exec "mkdir -p /etc/lightdm /home/vncuser/.config/lightdm"
          docker_exec "echo -e '[Seat:*]\nautologin-user=vncuser\nautologin-user-timeout=0\nuser-session=xfce' > /etc/lightdm/lightdm.conf"
          docker_exec "chown -R vncuser:vncuser /home/vncuser/.config"

          docker_exec "chown -R vncuser:vncuser /opt/novnc 2>/dev/null || true"
          docker_exec "chown -R vncuser:vncuser /opt/venv 2>/dev/null || true"

          docker_exec "su -l vncuser -c 'echo \"exec startxfce4\" > ~/.xsession'"
          docker_exec "su -l vncuser -c 'echo \"exec startxfce4\" > ~/.xinitrc'"

          if [ "$PKG_MGR" = "pacman" ]; then
            docker_exec "su -l vncuser -c 'mkdir -p ~/.config/xfce4 ~/.config/xfce4-session'"
            docker_exec "cp -r /etc/xdg/xfce4/* ~vncuser/.config/xfce4/ 2>/dev/null || true"
            docker_exec "chown -R vncuser:vncuser ~vncuser/.config"
          fi

      - name: 🚀 Khởi động Xvfb, xfce4, VNC và noVNC
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }
          docker_exec "
            su -l vncuser -s /bin/sh -c '
              export DISPLAY=:99
              export XDG_RUNTIME_DIR=/tmp/runtime-vncuser
              mkdir -p \$XDG_RUNTIME_DIR
              chmod 700 \$XDG_RUNTIME_DIR
              
              mkdir -p ~/.config/xfce4 ~/.cache
              export PATH=/opt/venv/bin:\$PATH
              
              rm -f /tmp/.X99-lock 2>/dev/null
              
              eval \`dbus-launch --sh-syntax\`
              echo \"DBUS_SESSION_BUS_ADDRESS=\$DBUS_SESSION_BUS_ADDRESS\"
              
              Xvfb :99 -screen 0 1280x720x24 -ac &
              sleep 3
              
              startxfce4 &
              sleep 8
              
              pkill lightdm 2>/dev/null || true
              
              # x11vnc: chỉ dùng các tùy chọn cơ bản, bỏ -compresslevel -defer -wait
              x11vnc -display :99 -forever -shared -passwd ${{ github.event.inputs.vnc_password }} -rfbport 5900 -noxdamage &
              sleep 2
              
              if command -v websockify >/dev/null 2>&1; then
                if [ -d /opt/novnc ]; then
                  # websockify: bỏ --buffer-size
                  websockify --web=/opt/novnc 8080 localhost:5900 &
                elif [ -d /usr/share/novnc ]; then
                  websockify --web=/usr/share/novnc 8080 localhost:5900 &
                else
                  websockify 8080 localhost:5900 &
                fi
              else
                echo \"⚠️ websockify not found, noVNC không khởi động\"
              fi
              
              sleep infinity
            '
          " &
          sleep 15

      - name: 🌐 Chạy Cloudflare Tunnel (trycloudflare)
        run: |
          docker_exec() {
            if docker exec desktop-env which bash >/dev/null 2>&1; then
              docker exec desktop-env bash -c "$1"
            else
              docker exec desktop-env sh -c "$1"
            fi
          }
          docker_exec "
            su -l vncuser -s /bin/sh -c '
              export DISPLAY=:99
              export XDG_RUNTIME_DIR=/tmp/runtime-vncuser
              /usr/local/bin/cloudflared tunnel access tcp http://localhost:5900 --logfile /tmp/cloudflared.log &
              sleep 10
              echo \"=== CLOUDFLARE TUNNEL URL ===\"
              grep -o \"https://[-0-9a-z]*\\.trycloudflare\\.com\" /tmp/cloudflared.log | head -1
              echo \"==============================\"
              echo \"🔗 Mở link trên bằng trình duyệt, nhập mật khẩu VNC: ${{ github.event.inputs.vnc_password }}\"
              echo \"⚠️  Workflow sẽ tự động dừng sau 6 giờ (timeout).\"
              tail -f /tmp/cloudflared.log
            '
          "
