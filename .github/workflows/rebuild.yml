name: 🔍 Debug Cloudflared on Alpine x86_32 (iSH 3.14.3)

on:
  workflow_dispatch:

jobs:
  debug:
    name: Run cloudflared in i386/alpine:3.14.3
    runs-on: ubuntu-latest

    steps:
      - name: 🐳 Run Docker container (i386/alpine:3.14.3)
        run: |
          docker run --rm -v $PWD:/workspace -w /workspace i386/alpine:3.14.3 sh -c "
            set -ex

            # 1. Cập nhật repository Alpine 3.14 (main/community)
            echo 'http://dl-cdn.alpinelinux.org/alpine/v3.14/main/' > /etc/apk/repositories
            echo 'http://dl-cdn.alpinelinux.org/alpine/v3.14/community/' >> /etc/apk/repositories
            apk update

            # 2. Cài công cụ debug (giống iSH có thể có)
            apk add --no-cache curl strace file gdb musl-dbg

            # 3. Tải cloudflared mới nhất cho linux-386
            echo '📥 Downloading latest cloudflared for linux-386...'
            curl -sL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-386 -o cloudflared
            chmod +x cloudflared

            # 4. Kiểm tra thông tin binary và thư viện
            echo '🔍 File info:'
            file cloudflared
            ldd cloudflared || true

            # 5. Chạy thử --version
            echo '🧪 Running --version:'
            ./cloudflared --version || echo '❌ Exit code: '\$?

            # 6. strace ghi lại toàn bộ syscall
            echo '📜 Running with strace (full syscall trace)...'
            strace -f -o strace_full.log ./cloudflared --version 2>&1 || true

            # 7. Lọc các lỗi hệ thống đặc trưng của iSH
            echo '⚠️ Filtering errors (EPERM, SIGSYS, unimplemented, epoll...):'
            grep -E 'unimplemented|ENOSYS|EPERM|EFAULT|SIGSEGV|SIGSYS|epoll_ctl.*EPERM|futex.*EAGAIN|clone.*failed' \
              strace_full.log | tee syscall_errors.log || echo '✅ No iSH-like errors found'

            # 8. (Tùy chọn) Chạy với --verbose để xem log chi tiết
            echo '📢 Running with --verbose (first 200 lines):'
            timeout 10s ./cloudflared tunnel --url localhost:8080 --log-level debug --verbose 2>&1 | head -n 200 || true

            # 9. Thử network cơ bản
            echo '🌐 Testing network connectivity...'
            nc -zv 1.1.1.1 443 || echo 'netcat failed'

            # 10. GDB backtrace nếu crash (core dump)
            echo '🔧 Attempting GDB backtrace (if core dumped)...'
            ulimit -c unlimited
            ./cloudflared --version || true
            if [ -f core ]; then
              gdb -batch -ex 'bt' ./cloudflared core || true
            else
              echo 'No core dump found'
            fi
          "

      - name: 📤 Upload logs (artifacts)
        uses: actions/upload-artifact@v4
        with:
          name: cloudflared-debug-logs-alpine-3.14
          path: |
            strace_full.log
            syscall_errors.log
          retention-days: 7

      - name: 📋 Print summary of errors (short)
        run: |
          echo "=== 📋 SUMMARY OF ERRORS/WARNINGS ==="
          if [ -f syscall_errors.log ]; then
            cat syscall_errors.log
          else
            echo "No error log found"
          fi
